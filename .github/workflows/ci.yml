name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
      - 'latest'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
  schedule:
    # 每天凌晨2点执行全量检查
    - cron: '0 2 * * *'

env:
  GO_VERSION: '1.24.3'  # Go 1.24 最新补丁版（2024年10月，修复已知 bug）
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 使用国内 Go 模块代理，加速依赖下载并提升稳定性
  GOPROXY: https://goproxy.cn,direct

jobs:
  # 后端CI
  backend:
    name: 后端CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 配置Go环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: 💾 缓存Go模块
        uses: actions/cache@v4
        id: go-cache
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 📦 下载依赖
        run: |
          echo "::group::下载Go依赖"
          go mod tidy
          go mod download
          echo "✅ 依赖下载完成"
          echo "::endgroup::"

      - name: 📏 检查代码格式 (gofmt)
        run: |
          echo "::group::检查代码格式 (gofmt)"
          # 检查 gofmt 格式（独立步骤，与 linter 解耦）
          FMT_OUTPUT=$(gofmt -d -s . 2>&1)
          if [ -n "$FMT_OUTPUT" ]; then
            echo "::error::代码格式不符合 gofmt 要求！"
            echo "请运行: gofmt -w -s ."
            echo "$FMT_OUTPUT" | head -50  # 显示前50行差异
            exit 1
          fi
          echo "✅ 代码格式检查通过"
          echo "::endgroup::"
      
      - name: 📏 检查导入格式 (goimports)
        run: |
          echo "::group::检查导入格式 (goimports)"
          # 检查 goimports 格式（导入分组和排序）
          if ! command -v goimports &> /dev/null; then
            echo "安装 goimports..."
            go install golang.org/x/tools/cmd/goimports@latest
          fi
          IMPORT_OUTPUT=$(goimports -d . 2>&1)
          if [ -n "$IMPORT_OUTPUT" ]; then
            echo "::error::导入格式不符合 goimports 要求！"
            echo "请运行: goimports -w ."
            echo "$IMPORT_OUTPUT" | head -50  # 显示前50行差异
            exit 1
          fi
          echo "✅ 导入格式检查通过"
          echo "::endgroup::"

      - name: 🔎 静态代码分析 (golangci-lint)
        run: |
          echo "::group::静态代码分析 (golangci-lint)"
          # 确保依赖已下载（虽然前面已经下载，但这里再次验证）
          echo "验证依赖完整性..."
          go mod verify
          go mod download
          # 先构建一次确保依赖正确解析和类型检查
          echo "验证构建..."
          if ! go build ./...; then
            echo "::error::构建失败，无法继续运行 golangci-lint"
            exit 1
          fi
          echo "✅ 构建验证通过，依赖解析正常"
          # 使用 golangci-lint v1.59.0 稳定版（兼容 Go 1.24，官方已发布该标签）
          GOLANGCI_LINT_VERSION="v1.59.0"
          # 优先使用 GitCode 镜像安装脚本，加速国内访问；失败时回退到官方地址
          GOLANGCI_INSTALL_MIRROR="https://gitcode.com/golangci/golangci-lint/raw/master/install.sh"
          GOLANGCI_INSTALL_OFFICIAL="https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh"
          echo "优先从 GitCode 镜像下载安装脚本..."
          if curl -sSfL "$GOLANGCI_INSTALL_MIRROR" | sh -s -- -b $(go env GOPATH)/bin $GOLANGCI_LINT_VERSION; then
            echo "✅ 通过 GitCode 镜像安装 golangci-lint 成功"
          else
            echo "::warning::从 GitCode 镜像安装失败，回退到官方安装脚本"
            curl -sSfL "$GOLANGCI_INSTALL_OFFICIAL" | sh -s -- -b $(go env GOPATH)/bin $GOLANGCI_LINT_VERSION
          fi
          # 确保 PATH 包含 golangci-lint
          export PATH=$(go env GOPATH)/bin:$PATH
          golangci-lint --version
          # 验证配置文件存在
          if [ ! -f ".golangci.yml" ]; then
            echo "::error::.golangci.yml 配置文件不存在"
            exit 1
          fi
          # 🔍 预检：检测配置中是否包含被禁止的 formatter
          echo "检查配置中是否包含 formatter（gofmt/goimports/gofumpt）..."
          if grep -qE '^\s*-\s+(gofmt|goimports|gofumpt)' .golangci.yml; then
            echo "::error::检测到配置中包含 formatter（gofmt/goimports/gofumpt）"
            echo "在 golangci-lint v2 中，这些不能作为 linter 启用"
            echo "请从 linters.enable 中移除它们，格式检查已在 CI 中单独处理"
            grep -nE '^\s*-\s+(gofmt|goimports|gofumpt)' .golangci.yml || true
            exit 1
          fi
          echo "✅ 配置文件格式验证通过（v2 格式，无 formatter）"
          # 🔍 检查配置中是否包含已废弃的 linters
          echo "检查配置中是否包含已废弃的 linters..."
          DEPRECATED_LINTERS=("gosimple" "stylecheck" "exportloopref" "deadcode" "varcheck" "structcheck" "golint")
          FOUND_DEPRECATED=false
          for linter in "${DEPRECATED_LINTERS[@]}"; do
            if grep -qE "^\s*-\s+${linter}" .golangci.yml; then
              echo "::error::检测到已废弃的 linter: ${linter}"
              echo "  原因: 在 golangci-lint v2 中已被移除或整合"
              echo "  建议: 从配置中移除（功能已整合到其他 linter）"
              FOUND_DEPRECATED=true
            fi
          done
          if [ "$FOUND_DEPRECATED" = true ]; then
            echo "已废弃的 linter 说明:"
            echo "  - gosimple/stylecheck → 已整合到 staticcheck"
            echo "  - exportloopref → Go 1.22+ 已修复循环变量问题，无需此 linter"
            echo "  - deadcode/varcheck/structcheck → 已整合到 unused"
            exit 1
          fi
          echo "✅ 未发现已废弃的 linter"
          # ✅ 验证配置文件语法（v1.59.3+ 使用 verify 命令）
          echo "验证 golangci-lint 配置文件语法..."
          if golangci-lint config verify --config .golangci.yml 2>&1; then
            echo "✅ 配置文件语法验证通过"
          else
            echo "::error::配置文件语法验证失败，请检查 .golangci.yml"
            exit 1
          fi
          # 运行 golangci-lint，使用配置文件
          # 说明：
          # - 不再强制使用 --modules-download-mode=readonly
          # - 允许 golangci-lint 按需下载依赖，避免在某些环境下出现 typecheck 对第三方包（yaml/redis/minio 等）误报 undefined
          # v1.59.0 版本已兼容 Go 1.24.3，shadow 检查现在是 govet 的子检查项
          golangci-lint run --config .golangci.yml ./... || {
            echo "::error::golangci-lint 检查失败"
            exit 1
          }
          echo "✅ golangci-lint 检查通过"
          echo "::endgroup::"

      # 注意：staticcheck 和 gosec 已通过 golangci-lint 执行，无需单独运行
      # golangci-lint 已启用 staticcheck 和 gosec linter，会执行完整的检查


      - name: 🧪 运行后端单元测试
        run: |
          echo "::group::运行后端单元测试"
          go test -v -race -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "✅ 单元测试执行完成，覆盖率: $COVERAGE"
          # 检查覆盖率是否达到最低阈值（80%）
          COVERAGE_NUM=$(echo "$COVERAGE" | sed 's/%//' | awk '{print int($1)}')
          if [ "$COVERAGE_NUM" -lt 80 ]; then
            echo "::warning::测试覆盖率 ($COVERAGE) 低于最低阈值 (80%)，建议提高测试覆盖率"
          else
            echo "✅ 测试覆盖率 ($COVERAGE) 达到最低阈值 (80%)"
          fi
          echo "::endgroup::"

      - name: 📊 上传测试覆盖率
        uses: codecov/codecov-action@v4
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        with:
          file: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 🏗️ 构建后端
        run: |
          echo "::group::构建后端"
          go build -v -o registry-server ./cmd/server/...
          if [ ! -f "registry-server" ]; then
            echo "::error::后端构建失败"
            exit 1
          fi
          echo "✅ 后端构建成功"
          ls -lh registry-server
          echo "::endgroup::"

      - name: 📤 上传后端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: registry-server
          retention-days: 7  # 统一保留时间为 7 天

      - name: 📊 后端CI汇总
        if: always()
        run: |
          echo "## 后端CI结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 代码格式检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 静态代码分析：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 安全扫描：完成" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 构建：成功" >> $GITHUB_STEP_SUMMARY

  # 前端CI
  frontend:
    name: 前端CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 配置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 🌐 配置npm镜像源（中国优化）
        run: |
          echo "::group::配置npm镜像源"
          npm config set registry https://registry.npmmirror.com
          echo "✅ npm镜像源配置完成"
          echo "::endgroup::"

      - name: 📦 安装依赖
        run: |
          echo "::group::安装前端依赖"
          npm ci --no-audit --progress=false || {
            echo "::error::依赖安装失败"
            exit 1
          }
          echo "✅ 依赖安装成功"
          echo "::endgroup::"

      - name: 🔍 TypeScript类型检查
        run: |
          echo "::group::TypeScript类型检查"
          npm run type-check || {
            echo "::error::TypeScript类型检查失败"
            exit 1
          }
          echo "✅ TypeScript类型检查通过"
          echo "::endgroup::"

      - name: 🎨 代码格式检查 (Prettier)
        run: |
          echo "::group::代码格式检查 (Prettier)"
          npx prettier --check --cache src/ || {
            echo "::error::代码格式检查失败，请运行 'npx prettier --write src/' 修复"
            exit 1
          }
          echo "✅ 代码格式检查通过"
          echo "::endgroup::"

      - name: 🔎 代码质量检查 (ESLint)
        run: |
          echo "::group::代码质量检查 (ESLint)"
          npx eslint src/ --ext .vue,.ts,.tsx --max-warnings=0 --cache || {
            echo "::error::ESLint检查失败"
            exit 1
          }
          echo "✅ ESLint检查通过"
          echo "::endgroup::"

      - name: 🛡️ 依赖漏洞扫描
        run: |
          echo "::group::依赖漏洞扫描"
          # npmmirror.com 已支持 npm audit API（2023年更新），无需切换源
          if npm audit --audit-level=high; then
            echo "✅ 依赖漏洞扫描通过"
          else
            echo "::warning::依赖漏洞扫描发现高危漏洞或失败，但继续执行"
          fi
          echo "::endgroup::"

      - name: 🏗️ 构建前端
        run: |
          echo "::group::构建前端"
          npm run build || {
            echo "::error::前端构建失败"
            exit 1
          }
          if [ ! -d "dist" ]; then
            echo "::error::构建产物不存在"
            exit 1
          fi
          echo "✅ 前端构建成功"
          du -sh dist/
          echo "::endgroup::"

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/dist/
          retention-days: 7

      - name: 📊 前端CI汇总
        if: always()
        run: |
          echo "## 前端CI结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ TypeScript类型检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 代码格式检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 依赖漏洞扫描：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 构建：成功" >> $GITHUB_STEP_SUMMARY

  # Docker镜像构建（多架构，并行执行）
  docker-build:
    name: Docker镜像构建（多架构）
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/tags/latest')) ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐳 设置Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: 🔐 登录到GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 准备平台标签
        run: |
          # 将平台格式从 linux/amd64 转换为 linux-amd64（Docker Tag 不允许 /）
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "PLATFORM_TAG=$PLATFORM_TAG" >> $GITHUB_ENV
          echo "平台标签: $PLATFORM_TAG"

      - name: 📋 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=${{ env.PLATFORM_TAG }},enable={{is_default_branch}}

      - name: 🏗️ 构建并推送Docker镜像（${{ matrix.platform }}）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.single
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            TARGETPLATFORM=${{ matrix.platform }}
            BUILDPLATFORM=linux/amd64
        continue-on-error: false

      - name: 📊 Docker构建汇总
        if: always()
        run: |
          echo "## Docker镜像构建结果 (${{ matrix.platform }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- ✅ 构建成功" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 镜像标签: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          fi

  # CodeQL安全扫描（独立执行，不依赖其他Job）
  codeql:
    name: CodeQL安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔒 初始化CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go, javascript
          queries: +security-and-quality

      - name: 🏗️ 自动构建
        uses: github/codeql-action/autobuild@v4

      - name: 🔍 执行CodeQL分析
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:multi

      - name: 📊 CodeQL扫描汇总
        if: always()
        run: |
          echo "## CodeQL安全扫描结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 结果已上传到GitHub Security" >> $GITHUB_STEP_SUMMARY

  # 代码质量检查汇总（优化错误报告）
  quality-check:
    name: 代码质量检查汇总
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend, frontend, docker-build, codeql]
    if: always()
    steps:
      - name: 📊 检查所有Job状态
        run: |
          BACKEND_STATUS="${{ needs.backend.result }}"
          FRONTEND_STATUS="${{ needs.frontend.result }}"
          DOCKER_BUILD_STATUS="${{ needs.docker-build.result }}"
          CODEQL_STATUS="${{ needs.codeql.result }}"
          
          echo "## CI任务状态汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 后端CI | $BACKEND_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| 前端CI | $FRONTEND_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker构建 | $DOCKER_BUILD_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL扫描 | $CODEQL_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          FAILED_JOBS=()
          if [ "$BACKEND_STATUS" != "success" ]; then
            FAILED_JOBS+=("后端CI")
          fi
          if [ "$FRONTEND_STATUS" != "success" ]; then
            FAILED_JOBS+=("前端CI")
          fi
          if [ "$DOCKER_BUILD_STATUS" != "success" ] && [ "$DOCKER_BUILD_STATUS" != "skipped" ]; then
            FAILED_JOBS+=("Docker构建")
          fi
          if [ "$CODEQL_STATUS" != "success" ] && [ "$CODEQL_STATUS" != "skipped" ]; then
            FAILED_JOBS+=("CodeQL扫描")
          fi
          
          if [ ${#FAILED_JOBS[@]} -gt 0 ]; then
            echo "❌ **部分CI任务失败**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 失败详情" >> $GITHUB_STEP_SUMMARY
            for job in "${FAILED_JOBS[@]}"; do
              echo "- ❌ $job" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 排查建议" >> $GITHUB_STEP_SUMMARY
            echo "1. 查看失败的Job日志" >> $GITHUB_STEP_SUMMARY
            echo "2. 检查代码格式和类型错误" >> $GITHUB_STEP_SUMMARY
            echo "3. 确认依赖安装是否成功" >> $GITHUB_STEP_SUMMARY
            echo "4. 检查构建产物是否存在" >> $GITHUB_STEP_SUMMARY
            
            echo "::error::CI任务失败: ${FAILED_JOBS[*]}"
            echo "后端状态: $BACKEND_STATUS"
            echo "前端状态: $FRONTEND_STATUS"
            exit 1
          fi
          
          echo "✅ **所有CI任务通过**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "所有检查已完成，代码质量良好。" >> $GITHUB_STEP_SUMMARY
          echo "✅ 所有CI任务通过"
